<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Well Wisher</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep: #0a0c18;
    --midnight: #0d1030;
    --ink: #111428;
    --water-deep: #0b2a4a;
    --water-mid: #0e4a7a;
    --water-glow: #1a7fc1;
    --water-shimmer: #5bc8f5;
    --water-light: #a8e6ff;
    --gold: #d4a843;
    --gold-light: #f0c96a;
    --gold-shine: #fff4c2;
    --mist: rgba(180,220,255,0.08);
    --stone: #3a3545;
    --stone-light: #584f6e;
  }

  html, body {
    width: 100%; min-height: 100vh;
    background: var(--deep);
    color: #e8e0ff;
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }

  /* ── STARS ── */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 8%,  rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 22%, rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 5%,  rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 18%, rgba(255,255,255,.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 40%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 35%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 50%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 45%, rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 5% 60%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 68%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 70% 72%, rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 85%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 50% 90%, rgba(200,200,255,.6) 0%, transparent 100%);
  }

  /* ── HEADER / NAV ── */
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 2rem 0;
  }
  .logo-wrap { text-align: center; }
  .logo-eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: .85rem; letter-spacing: .35em;
    color: var(--gold); opacity: .75; text-transform: uppercase;
    margin-bottom: .3rem;
  }
  .logo {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.8rem, 5vw, 3.4rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 45%, var(--gold-shine) 70%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 28px rgba(212,168,67,.55));
    letter-spacing: .06em;
  }
  .logo-sub {
    font-style: italic; font-size: .9rem; letter-spacing: .2em;
    color: rgba(200,185,255,.55); margin-top: .35rem;
  }

  /* ── HERO ── */
  .hero {
    position: relative; z-index: 5;
    display: flex; flex-direction: column; align-items: center;
    padding: 3rem 1rem 5rem;
    min-height: 80vh;
  }

  /* atmospheric glow behind well */
  .hero::before {
    content: '';
    position: absolute; top: 30%; left: 50%;
    transform: translate(-50%, -50%);
    width: 520px; height: 360px;
    background: radial-gradient(ellipse, rgba(30,120,200,.18) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── WISHING WELL ── */
  .well-scene {
    position: relative; width: 320px; height: 380px;
    margin: 0 auto 2.5rem;
    z-index: 5;
    filter: drop-shadow(0 30px 60px rgba(10,40,90,.7));
  }

  /* stone base */
  .well-base {
    position: absolute; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 220px; height: 40px;
    background: linear-gradient(180deg, var(--stone-light) 0%, var(--stone) 100%);
    border-radius: 50% 50% 8px 8px / 30% 30% 8px 8px;
  }
  .well-base::before {
    content: '';
    position: absolute; top: -6px; left: -10px; right: -10px; height: 14px;
    background: linear-gradient(180deg, #6a5f80 0%, var(--stone) 100%);
    border-radius: 50%;
  }

  /* main cylinder */
  .well-body {
    position: absolute; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    width: 180px; height: 130px;
    background: linear-gradient(90deg, #2c2840 0%, #3d3558 20%, var(--stone) 50%, #3d3558 80%, #2c2840 100%);
    border-radius: 8px 8px 0 0;
    overflow: hidden;
  }
  .well-body::before { /* stone texture lines */
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent, transparent 14px,
      rgba(0,0,0,.15) 14px, rgba(0,0,0,.15) 16px
    );
  }
  .well-body::after { /* moss / aging */
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg,
      rgba(40,80,60,.25) 0%, transparent 30%,
      transparent 70%, rgba(40,80,60,.2) 100%
    );
  }

  /* well lip / rim */
  .well-rim {
    position: absolute; bottom: 152px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 24px;
    background: linear-gradient(180deg, #7a6f95 0%, var(--stone) 100%);
    border-radius: 50%;
    z-index: 2;
    box-shadow: 0 4px 16px rgba(0,0,0,.5);
  }

  /* water inside well */
  .well-water {
    position: absolute; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    width: 180px; height: 80px;
    border-radius: 0 0 4px 4px;
    overflow: hidden;
    z-index: 1;
  }
  .water-body {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      var(--water-mid) 0%,
      var(--water-deep) 100%
    );
  }
  /* animated shimmer layers */
  .water-shimmer-1, .water-shimmer-2, .water-shimmer-3 {
    position: absolute; left: -20%; width: 140%;
    border-radius: 40%;
    mix-blend-mode: screen;
  }
  .water-shimmer-1 {
    top: -18px; height: 36px;
    background: radial-gradient(ellipse, var(--water-shimmer) 0%, var(--water-glow) 50%, transparent 70%);
    opacity: .45;
    animation: shimmer1 3.2s ease-in-out infinite;
  }
  .water-shimmer-2 {
    top: -8px; height: 30px;
    background: radial-gradient(ellipse, var(--water-light) 0%, var(--water-shimmer) 40%, transparent 65%);
    opacity: .3;
    animation: shimmer2 2.7s ease-in-out infinite reverse;
  }
  .water-shimmer-3 {
    top: 10px; height: 22px;
    background: radial-gradient(ellipse, rgba(130,230,255,.5) 0%, transparent 60%);
    opacity: .2;
    animation: shimmer1 4s ease-in-out infinite 1s;
  }
  @keyframes shimmer1 {
    0%,100% { transform: translateX(0) rotate(-3deg) scaleX(1); }
    50%      { transform: translateX(6%) rotate(3deg) scaleX(1.04); }
  }
  @keyframes shimmer2 {
    0%,100% { transform: translateX(0) rotate(4deg) scaleX(1); }
    50%      { transform: translateX(-5%) rotate(-4deg) scaleX(1.03); }
  }
  /* glowing surface reflection */
  .water-glow-line {
    position: absolute; top: 4px; left: 15%; width: 70%; height: 3px;
    background: linear-gradient(90deg, transparent, var(--water-light), transparent);
    border-radius: 50%;
    opacity: .6;
    animation: glowline 2.2s ease-in-out infinite;
  }
  @keyframes glowline {
    0%,100% { opacity:.4; transform:scaleX(.9); }
    50%      { opacity:.75; transform:scaleX(1.05); }
  }
  /* ethereal mist rising from water */
  .mist-wrap {
    position: absolute; bottom: 100px; left: 50%;
    transform: translateX(-50%);
    width: 180px; height: 80px;
    pointer-events: none; z-index: 3; overflow: visible;
  }
  .mist-puff {
    position: absolute; bottom: 0;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(160,220,255,.18) 0%, transparent 70%);
    animation: mistrise 4s ease-out infinite;
  }
  .mist-puff:nth-child(1) { width:60px;height:40px; left:20%; animation-delay:0s; }
  .mist-puff:nth-child(2) { width:80px;height:50px; left:35%; animation-delay:1.3s; }
  .mist-puff:nth-child(3) { width:50px;height:35px; left:55%; animation-delay:2.6s; }
  @keyframes mistrise {
    0%   { opacity:0; transform:translateY(0) scaleX(1); }
    30%  { opacity:.7; }
    100% { opacity:0; transform:translateY(-55px) scaleX(1.5); }
  }

  /* roof / canopy posts */
  .post-left, .post-right {
    position: absolute; bottom: 158px;
    width: 12px; height: 160px;
    background: linear-gradient(90deg, var(--stone) 0%, var(--stone-light) 50%, var(--stone) 100%);
    border-radius: 3px;
    z-index: 3;
  }
  .post-left  { left: 52px; }
  .post-right { right: 52px; }

  /* roof beam */
  .roof-beam {
    position: absolute; top: 0; left: 50%;
    transform: translateX(-50%);
    width: 220px; height: 18px;
    background: linear-gradient(180deg, var(--stone-light) 0%, var(--stone) 100%);
    border-radius: 4px;
    z-index: 4;
    box-shadow: 0 4px 16px rgba(0,0,0,.5);
  }
  /* roof triangle */
  .roof {
    position: absolute; top: 0; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 120px solid transparent;
    border-right: 120px solid transparent;
    border-bottom: 70px solid #2c2840;
    z-index: 4;
    filter: drop-shadow(0 -4px 8px rgba(0,0,0,.4));
  }
  .roof::after {
    content: '';
    position: absolute; top: 10px; left: -100px;
    width: 0; height: 0;
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-bottom: 52px solid #3a3555;
  }
  /* ridge ornament */
  .ridge-ball {
    position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 20px;
    background: radial-gradient(circle at 35% 35%, var(--gold-light), var(--gold));
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(212,168,67,.6);
    z-index: 5;
  }

  /* bucket rope */
  .rope {
    position: absolute; top: 68px; left: 50%;
    transform: translateX(-50%);
    width: 2px; height: 90px;
    background: linear-gradient(180deg, #8a7a55, #6a5a45);
    z-index: 4;
  }

  /* ── COIN ── */
  #coin {
    position: absolute; top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 36px; height: 36px;
    cursor: pointer;
    z-index: 10;
    user-select: none;
    transition: transform .15s;
    filter: drop-shadow(0 0 8px rgba(212,168,67,.9));
  }
  #coin:hover { transform: translateX(-50%) scale(1.15); }
  #coin:active { transform: translateX(-50%) scale(.95); }
  #coin.dropping {
    animation: coindrop 1.1s cubic-bezier(.45,.05,.55,1) forwards;
  }
  @keyframes coindrop {
    0%   { top: 12px; opacity: 1; transform: translateX(-50%) rotateY(0deg); }
    40%  { top: 80px; opacity: 1; transform: translateX(-50%) rotateY(360deg); }
    70%  { top: 150px; opacity: .7; transform: translateX(-50%) rotateY(720deg) scale(.7); }
    100% { top: 220px; opacity: 0; transform: translateX(-50%) rotateY(1080deg) scale(.3); }
  }

  /* ripple on coin drop */
  .ripple {
    position: absolute; bottom: 42px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-radius: 50%;
    border: 2px solid var(--water-shimmer);
    pointer-events: none; z-index: 6;
    opacity: 0;
  }
  .ripple.active {
    animation: rippleout .9s ease-out forwards;
  }
  @keyframes rippleout {
    0%   { width:0; height:0; opacity:.8; margin-left:0; margin-bottom:0; }
    100% { width:120px; height:30px; opacity:0; margin-left:-60px; margin-bottom:-15px; }
  }

  /* ── WISH TEXT ── */
  .wish-text {
    position: absolute; top: -3rem; left: 50%; transform: translateX(-50%);
    white-space: nowrap;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 1rem; color: var(--gold-light);
    opacity: 0; pointer-events: none; z-index: 20;
    filter: drop-shadow(0 0 8px rgba(212,168,67,.8));
  }
  .wish-text.show {
    animation: wishfloat 2.4s ease-out forwards;
  }
  @keyframes wishfloat {
    0%   { opacity:0; transform:translateX(-50%) translateY(0); }
    20%  { opacity:1; }
    80%  { opacity:.9; transform:translateX(-50%) translateY(-28px); }
    100% { opacity:0; transform:translateX(-50%) translateY(-40px); }
  }

  /* ── CLICK HINT ── */
  .click-hint {
    text-align: center; font-style: italic;
    font-size: .9rem; letter-spacing: .1em;
    color: rgba(180,200,255,.5);
    margin-bottom: 0; margin-top: -1rem;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:.4; } 50% { opacity:.85; }
  }

  /* ── SLIDER SECTION ── */
  .slider-section {
    position: relative; z-index: 5;
    width: 100%; max-width: 560px; margin: 0 auto;
    padding: 0 1.5rem 0;
    text-align: center;
  }

  .tier-display {
    margin-bottom: 1.5rem;
  }
  .tier-price {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(212,168,67,.4));
    line-height: 1;
  }
  .tier-desc {
    font-style: italic; font-size: 1.1rem;
    color: rgba(200,185,255,.7); margin-top: .4rem;
    letter-spacing: .06em;
  }

  /* custom slider */
  .slider-wrap {
    position: relative; padding: .5rem 0 2rem;
  }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 4px;
    outline: none; cursor: pointer;
    background: linear-gradient(90deg,
      var(--gold) 0%,
      var(--gold) var(--fill,33%),
      rgba(255,255,255,.1) var(--fill,33%),
      rgba(255,255,255,.1) 100%
    );
    border: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 28px; height: 28px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--gold-shine), var(--gold));
    box-shadow: 0 0 16px rgba(212,168,67,.7), 0 2px 8px rgba(0,0,0,.5);
    border: 2px solid rgba(255,255,255,.3);
    cursor: pointer; transition: transform .15s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  input[type=range]::-moz-range-thumb {
    width: 28px; height: 28px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--gold-shine), var(--gold));
    box-shadow: 0 0 16px rgba(212,168,67,.7); border: 2px solid rgba(255,255,255,.3);
    cursor: pointer;
  }

  /* tier labels */
  .tier-labels {
    display: flex; justify-content: space-between;
    margin-top: .6rem;
  }
  .tier-label {
    font-size: .75rem; letter-spacing: .08em; text-transform: uppercase;
    color: rgba(180,160,255,.45); transition: color .3s;
    flex: 1; text-align: center;
  }
  .tier-label:first-child { text-align: left; }
  .tier-label:last-child  { text-align: right; }
  .tier-label.active { color: var(--gold-light); }

  /* CTA button */
  .cta-btn {
    display: inline-block; margin-top: 2.2rem;
    padding: .9rem 2.8rem; border-radius: 4px;
    font-family: 'Cinzel Decorative', serif; font-size: .85rem; letter-spacing: .1em;
    color: var(--deep);
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 60%, #b8902c 100%);
    border: none; cursor: pointer;
    box-shadow: 0 0 32px rgba(212,168,67,.4), 0 4px 20px rgba(0,0,0,.5);
    transition: transform .2s, box-shadow .2s;
  }
  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 48px rgba(212,168,67,.6), 0 8px 30px rgba(0,0,0,.5);
  }
  .cta-btn:active { transform: translateY(0); }

  /* ── TAGLINE ── */
  .tagline {
    position: relative; z-index: 5;
    text-align: center; padding: 0 1rem 4rem;
    font-style: italic; font-size: clamp(.95rem, 2.5vw, 1.15rem);
    color: rgba(200,190,255,.4); letter-spacing: .1em;
    max-width: 460px; margin: 1.5rem auto 0;
    line-height: 1.8;
  }

  /* glow orb bottom */
  .orb-bottom {
    position: absolute; bottom: -60px; left: 50%;
    transform: translateX(-50%);
    width: 400px; height: 200px;
    background: radial-gradient(ellipse, rgba(80,40,160,.18) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }
</style>
</head>
<body>
<div class="stars"></div>

<header>
  <div class="logo-wrap">
    <div class="logo-eyebrow">✦ make your wish ✦</div>
    <div class="logo">The Well Wisher</div>
    <div class="logo-sub">where intentions meet the infinite</div>
  </div>
</header>

<section class="hero">
  <!-- Wishing Well -->
  <div class="well-scene" id="wellScene">
    <!-- wish text -->
    <div class="wish-text" id="wishText">✨ Your wish is cast... ✨</div>

    <!-- roof -->
    <div class="roof"></div>
    <div class="roof-beam"></div>
    <div class="ridge-ball"></div>

    <!-- posts -->
    <div class="post-left"></div>
    <div class="post-right"></div>

    <!-- rope + COIN -->
    <div class="rope"></div>
    <svg id="coin" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg" title="Click to make a wish">
      <defs>
        <radialGradient id="cg" cx="35%" cy="35%">
          <stop offset="0%" stop-color="#fff4c2"/>
          <stop offset="40%" stop-color="#d4a843"/>
          <stop offset="100%" stop-color="#8a6010"/>
        </radialGradient>
        <radialGradient id="cg2" cx="50%" cy="50%">
          <stop offset="0%" stop-color="rgba(255,255,255,.25)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
      </defs>
      <circle cx="18" cy="18" r="17" fill="url(#cg)" stroke="#b8902c" stroke-width="1"/>
      <circle cx="18" cy="18" r="17" fill="url(#cg2)"/>
      <text x="18" y="23" text-anchor="middle" font-size="14" fill="rgba(120,80,0,.7)" font-family="serif" font-weight="bold">✦</text>
    </svg>

    <!-- well rim -->
    <div class="well-rim"></div>

    <!-- water + mist -->
    <div class="well-water">
      <div class="water-body"></div>
      <div class="water-shimmer-1"></div>
      <div class="water-shimmer-2"></div>
      <div class="water-shimmer-3"></div>
      <div class="water-glow-line"></div>
    </div>

    <div class="mist-wrap">
      <div class="mist-puff"></div>
      <div class="mist-puff"></div>
      <div class="mist-puff"></div>
    </div>

    <!-- well body -->
    <div class="well-body"></div>
    <div class="well-base"></div>

    <!-- ripple -->
    <div class="ripple" id="ripple"></div>
  </div>

  <p class="click-hint">✦ click the coin to cast your wish ✦</p>

  <!-- Slider -->
  <div class="slider-section">
    <div class="tier-display">
      <div class="tier-price" id="tierPrice">$1</div>
      <div class="tier-desc" id="tierDesc">1 minute of well wishing</div>
    </div>

    <div class="slider-wrap">
      <input type="range" id="wishSlider" min="0" max="2" step="1" value="0">
      <div class="tier-labels">
        <span class="tier-label active" id="label0">$1</span>
        <span class="tier-label" id="label1">$10</span>
        <span class="tier-label" id="label2">$20</span>
      </div>
    </div>

    <button class="cta-btn" id="ctaBtn">Begin Your Wish</button>
  </div>
</section>

<p class="tagline">
  Cast your coin into the ancient waters and let your deepest wishes ripple outward into the universe.
</p>

<div class="orb-bottom"></div>

<script>
  // ── SLIDER ──
  const tiers = [
    { price: '$1',  desc: '1 minute of well wishing',  fill: '0%' },
    { price: '$10', desc: '12 minutes of well wishing', fill: '50%' },
    { price: '$20', desc: '25 minutes of well wishing', fill: '100%' },
  ];
  const slider     = document.getElementById('wishSlider');
  const tierPrice  = document.getElementById('tierPrice');
  const tierDesc   = document.getElementById('tierDesc');
  const labels     = [document.getElementById('label0'), document.getElementById('label1'), document.getElementById('label2')];

  function updateSlider(val) {
    const t = tiers[val];
    tierPrice.textContent = t.price;
    tierDesc.textContent  = t.desc;
    slider.style.setProperty('--fill', t.fill);
    labels.forEach((l, i) => l.classList.toggle('active', i === val));
  }

  slider.addEventListener('input', () => updateSlider(+slider.value));
  updateSlider(0);

  // ── COIN DROP ──
  const coin      = document.getElementById('coin');
  const ripple    = document.getElementById('ripple');
  const wishText  = document.getElementById('wishText');
  const messages  = [
    '✨ Your wish is cast...',
    '🌙 May it come true...',
    '✦ The waters heard you...',
    '💫 Wish granted...',
    '🌟 Into the deep...',
  ];
  let dropping = false;

  coin.addEventListener('click', () => {
    if (dropping) return;
    dropping = true;

    // random wish message
    wishText.textContent = messages[Math.floor(Math.random() * messages.length)];

    coin.classList.add('dropping');
    wishText.classList.add('show');

    // ripple after coin hits water
    setTimeout(() => {
      ripple.classList.add('active');
    }, 750);

    // reset
    setTimeout(() => {
      coin.classList.remove('dropping');
      ripple.classList.remove('active');
      wishText.classList.remove('show');
      dropping = false;
    }, 2500);
  });

  // ── CTA ──
  document.getElementById('ctaBtn').addEventListener('click', () => {
    const val = +slider.value;
    alert(`Your ${tiers[val].price} wish session (${tiers[val].desc}) is about to begin.\n\n✦ Drop the coin to make it so. ✦`);
  });
</script>
</body>
</html>
