<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Wish Giver</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep: #080b14;
    --gold: #d4a843;
    --gold-light: #f0c96a;
    --gold-shine: #fff8d6;
    --water1: #0e4a7a;
    --water2: #0b2a4a;
    --shimmer: #5bc8f5;
  }

  html, body {
    width: 100%; min-height: 100vh;
    background: radial-gradient(ellipse at 50% 0%, #0d1535 0%, #080b14 60%);
    color: #e8e0ff;
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }

  /* STARS */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute; border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  }
  @keyframes twinkle {
    0%,100% { opacity: var(--lo, .2); transform: scale(1); }
    50%      { opacity: var(--hi, .8); transform: scale(1.3); }
  }

  /* HEADER */
  header {
    position: relative; z-index: 10;
    text-align: center; padding: 2.2rem 1rem .5rem;
  }
  .eyebrow {
    font-style: italic; font-size: .8rem; letter-spacing: .4em;
    color: var(--gold); opacity: .9; text-transform: uppercase; margin-bottom: .4rem; font-size: 1rem;
  }
  .logo {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.9rem, 5vw, 3.5rem); font-weight: 700;
    background: linear-gradient(135deg, var(--gold-shine) 0%, var(--gold-light) 30%, var(--gold) 60%, #b8851e 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 30px rgba(212,168,67,.5));
    letter-spacing: .05em;
  }
  .logo-sub {
    font-style: italic; font-size: .95rem; letter-spacing: .18em;
    color: rgba(220,210,255,.75); margin-top: .4rem; font-size: 1.1rem;
  }

  /* HERO */
  .hero {
    position: relative; z-index: 5;
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1rem 4rem;
  }

  .glow-bg {
    position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
    width: 500px; height: 400px; pointer-events: none;
    background: radial-gradient(ellipse, rgba(20,80,160,.22) 0%, transparent 65%);
  }

  /* WELL WRAP */
  .well-wrap {
    position: relative;
    width: 360px; height: 460px;
    margin: 0 auto 1rem;
    z-index: 6;
  }
  .well-svg { width: 100%; height: 100%; overflow: visible; }

  .water-surface { animation: wsurf 2.8s ease-in-out infinite; }
  @keyframes wsurf {
    0%,100% { transform: translateY(0); opacity: .55; }
    50%      { transform: translateY(-3px); opacity: .8; }
  }
  .water-glow-anim { animation: wglow 2.2s ease-in-out infinite; }
  @keyframes wglow {
    0%,100% { opacity: .3; }
    50%      { opacity: .7; }
  }
  .mist { animation: mistup var(--md, 4s) ease-out infinite var(--mdelay, 0s); }
  @keyframes mistup {
    0%   { opacity: 0; transform: translateY(0) scale(.8); }
    25%  { opacity: .6; }
    100% { opacity: 0; transform: translateY(-50px) scale(1.6); }
  }
  .rope-line { animation: ropesway 3s ease-in-out infinite; transform-origin: 180px 190px; }
  @keyframes ropesway {
    0%,100% { transform: rotate(-1deg); }
    50%      { transform: rotate(1deg); }
  }

  /* COIN */
  .coin-wrap {
    position: absolute;
    top: 58px; left: 50%;
    transform: translateX(-50%);
    cursor: pointer;
    z-index: 20;
    transition: transform .2s, filter .2s;
    filter: drop-shadow(0 0 14px rgba(212,168,67,1)) drop-shadow(0 0 28px rgba(212,168,67,.6));
  }
  .coin-wrap:hover {
    transform: translateX(-50%) scale(1.18) translateY(-5px);
    filter: drop-shadow(0 0 22px rgba(255,220,100,1)) drop-shadow(0 0 44px rgba(212,168,67,.9));
  }
  .coin-wrap:active { transform: translateX(-50%) scale(.95); }
  .coin-svg { width: 72px; height: 72px; display: block; }

  /* pulse rings */
  .coin-ring {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 72px; height: 72px; border-radius: 50%;
    border: 2px solid rgba(212,168,67,.5);
    animation: coinring 2s ease-out infinite;
    pointer-events: none;
  }
  .coin-ring:nth-child(2) { animation-delay: .65s; }
  .coin-ring:nth-child(3) { animation-delay: 1.3s; }
  @keyframes coinring {
    0%   { transform: translate(-50%,-50%) scale(1); opacity: .6; }
    100% { transform: translate(-50%,-50%) scale(2.4); opacity: 0; }
  }

  /* drop anim */
  .coin-wrap.dropping {
    animation: coinfall 1.25s cubic-bezier(.4,0,.6,1) forwards;
    pointer-events: none;
  }
  @keyframes coinfall {
    0%   { top: 58px;  opacity: 1; transform: translateX(-50%) rotate(0deg) scale(1); }
    35%  { top: 150px; opacity: 1; transform: translateX(-50%) rotate(200deg) scale(.9); }
    70%  { top: 255px; opacity: .7; transform: translateX(-50%) rotate(500deg) scale(.6); }
    100% { top: 310px; opacity: 0; transform: translateX(-50%) rotate(720deg) scale(.2); }
  }

  /* hint label */
  .coin-label {
    position: absolute; top: 136px; left: 50%; transform: translateX(-50%);
    white-space: nowrap;
    font-style: italic; font-size: .8rem; letter-spacing: .15em;
    color: rgba(212,168,67,.8);
    animation: labelpulse 2s ease-in-out infinite;
    pointer-events: none; z-index: 21;
  }
  @keyframes labelpulse { 0%,100%{opacity:.4;} 50%{opacity:1;} }

  /* wish message */
  .wish-msg {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    white-space: nowrap; font-style: italic; font-size: 1.1rem;
    color: var(--gold-light); opacity: 0; pointer-events: none;
    filter: drop-shadow(0 0 10px rgba(212,168,67,.9)); z-index: 30;
  }
  .wish-msg.show { animation: wishrise 2.6s ease-out forwards; }
  @keyframes wishrise {
    0%  { opacity:0; transform:translateX(-50%) translateY(8px); }
    20% { opacity:1; }
    80% { opacity:.9; transform:translateX(-50%) translateY(-22px); }
    100%{ opacity:0; transform:translateX(-50%) translateY(-38px); }
  }

  /* ripple */
  .ripple-el {
    position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0; border-radius: 50%;
    border: 2px solid var(--shimmer);
    opacity: 0; pointer-events: none; z-index: 7;
  }
  .ripple-el.active { animation: ripout .9s ease-out forwards; }
  @keyframes ripout {
    0%  { width:0;height:0;opacity:.9;margin-left:0;margin-bottom:0; }
    100%{ width:150px;height:38px;opacity:0;margin-left:-75px;margin-bottom:-19px; }
  }

  /* SLIDER */
  .slider-section {
    position: relative; z-index: 5;
    width: 100%; max-width: 520px; margin: 0 auto;
    padding: 0 1.5rem; text-align: center;
  }
  .tier-display { margin-bottom: 1.6rem; }
  .tier-price {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2.2rem, 6vw, 3.2rem);
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 18px rgba(212,168,67,.4)); line-height: 1;
  }
  .tier-desc {
    font-style: italic; font-size: 1.1rem; letter-spacing: .07em;
    color: rgba(220,210,255,.88); margin-top: .4rem; font-size: 1.25rem;
  }
  .slider-wrap { position: relative; padding: .5rem 0 1.8rem; }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 4px; outline: none; cursor: pointer;
    background: linear-gradient(90deg,
      var(--gold) 0%, var(--gold) var(--fill,0%),
      rgba(255,255,255,.1) var(--fill,0%), rgba(255,255,255,.1) 100%);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 26px; height: 26px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--gold-shine), var(--gold));
    box-shadow: 0 0 14px rgba(212,168,67,.8), 0 2px 6px rgba(0,0,0,.5);
    border: 2px solid rgba(255,255,255,.25); cursor: pointer; transition: transform .15s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  input[type=range]::-moz-range-thumb {
    width: 26px; height: 26px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--gold-shine), var(--gold));
    box-shadow: 0 0 14px rgba(212,168,67,.8); border: 2px solid rgba(255,255,255,.25); cursor: pointer;
  }
  .tier-labels { display: flex; justify-content: space-between; margin-top: .5rem; }
  .tier-label {
    font-size: .75rem; letter-spacing: .1em; text-transform: uppercase;
    color: rgba(180,160,255,.4); transition: color .3s; flex: 1; text-align: center;
  }
  .tier-label:first-child { text-align: left; }
  .tier-label:last-child  { text-align: right; }
  .tier-label.active { color: var(--gold-light); }

  .cta-btn {
    display: inline-block; margin-top: 2rem;
    padding: .95rem 3rem; border-radius: 3px;
    font-family: 'Cinzel Decorative', serif; font-size: .82rem; letter-spacing: .12em;
    color: #0a0c18;
    background: linear-gradient(135deg, var(--gold-shine) 0%, var(--gold-light) 30%, var(--gold) 70%, #a87820 100%);
    border: none; cursor: pointer;
    box-shadow: 0 0 30px rgba(212,168,67,.4), 0 4px 20px rgba(0,0,0,.5);
    transition: transform .2s, box-shadow .2s;
  }
  .cta-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 50px rgba(212,168,67,.65), 0 8px 28px rgba(0,0,0,.5);
  }

  .tagline {
    position: relative; z-index: 5; text-align: center;
    padding: 2rem 1rem 4rem; max-width: 440px; margin: 0 auto;
    font-style: italic; font-size: 1rem; letter-spacing: .1em;
    color: rgba(200,190,255,.35); line-height: 2;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <div class="eyebrow">✦ make your wish ✦</div>
  <div class="logo">The Wish Giver</div>
  <div class="logo-sub">where intentions meet the infinite</div>
</header>

<section class="hero">
  <div class="glow-bg"></div>

  <div class="well-wrap" id="wellWrap">
    <div class="wish-msg" id="wishMsg">✨ Your wish is cast...</div>

    <!-- COIN -->
    <div class="coin-wrap" id="coinWrap" title="Click to toss your coin!">
      <div class="coin-ring"></div>
      <div class="coin-ring"></div>
      <div class="coin-ring"></div>
      <svg class="coin-svg" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="cg" cx="38%" cy="32%">
            <stop offset="0%"   stop-color="#fff8d0"/>
            <stop offset="20%"  stop-color="#f5d070"/>
            <stop offset="55%"  stop-color="#d4a843"/>
            <stop offset="100%" stop-color="#7a5510"/>
          </radialGradient>
          <radialGradient id="cs" cx="30%" cy="25%">
            <stop offset="0%"  stop-color="rgba(255,255,255,.55)"/>
            <stop offset="70%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
        </defs>
        <!-- edge shadow -->
        <circle cx="36" cy="37" r="35" fill="#5a3d08" opacity=".6"/>
        <!-- main coin -->
        <circle cx="36" cy="36" r="34" fill="url(#cg)"/>
        <!-- outer rim -->
        <circle cx="36" cy="36" r="34" fill="none" stroke="rgba(255,240,160,.35)" stroke-width="2"/>
        <!-- inner ring -->
        <circle cx="36" cy="36" r="28" fill="none" stroke="rgba(100,65,0,.25)" stroke-width="1.5"/>
        <!-- shine overlay -->
        <circle cx="36" cy="36" r="34" fill="url(#cs)"/>
        <!-- center star symbol -->
        <text x="36" y="44" text-anchor="middle" font-size="26" fill="rgba(90,55,0,.6)" font-family="Georgia,serif">✦</text>
        <!-- WISH top -->
        <text x="36" y="17" text-anchor="middle" font-size="7" fill="rgba(90,55,0,.55)" font-family="Georgia,serif" letter-spacing="3">WISH</text>
        <!-- 1¢ bottom -->
        <text x="36" y="60" text-anchor="middle" font-size="7" fill="rgba(90,55,0,.55)" font-family="Georgia,serif" letter-spacing="1">1¢</text>
      </svg>
    </div>
    <div class="coin-label" id="coinLabel">↓ toss your coin ↓</div>

    <!-- WELL SVG -->
    <svg class="well-svg" viewBox="0 0 360 460" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="stoneMain" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#1a1628"/>
          <stop offset="12%"  stop-color="#322c48"/>
          <stop offset="35%"  stop-color="#4e4668"/>
          <stop offset="55%"  stop-color="#433c5c"/>
          <stop offset="80%"  stop-color="#2e2840"/>
          <stop offset="100%" stop-color="#1a1628"/>
        </linearGradient>
        <linearGradient id="stoneDk" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#100d18"/>
          <stop offset="40%"  stop-color="#221e30"/>
          <stop offset="100%" stop-color="#100d18"/>
        </linearGradient>
        <linearGradient id="rimTop" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#7a7090"/>
          <stop offset="50%"  stop-color="#524a6a"/>
          <stop offset="100%" stop-color="#221e30"/>
        </linearGradient>
        <linearGradient id="postG" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#14111e"/>
          <stop offset="35%"  stop-color="#3e3858"/>
          <stop offset="65%"  stop-color="#342e4a"/>
          <stop offset="100%" stop-color="#14111e"/>
        </linearGradient>
        <linearGradient id="roofG" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#22182e"/>
          <stop offset="100%" stop-color="#0e0b15"/>
        </linearGradient>
        <linearGradient id="waterG" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#2080c0"/>
          <stop offset="40%"  stop-color="#0e4a7a"/>
          <stop offset="100%" stop-color="#040f1e"/>
        </linearGradient>
        <radialGradient id="waterGl" cx="50%" cy="15%">
          <stop offset="0%"   stop-color="#5bc8f5" stop-opacity=".8"/>
          <stop offset="100%" stop-color="#0e4a7a" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="goldOrb" cx="38%" cy="32%">
          <stop offset="0%"   stop-color="#fff4c0"/>
          <stop offset="40%"  stop-color="#d4a843"/>
          <stop offset="100%" stop-color="#8a6010"/>
        </radialGradient>
        <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
        <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
        <filter id="drop"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="rgba(0,0,0,.65)"/></filter>
        <pattern id="bricks" x="0" y="0" width="44" height="24" patternUnits="userSpaceOnUse">
          <rect width="44" height="24" fill="transparent"/>
          <line x1="0" y1="12" x2="44" y2="12" stroke="rgba(0,0,0,.22)" stroke-width="1.5"/>
          <line x1="22" y1="0" x2="22" y2="12" stroke="rgba(0,0,0,.15)" stroke-width="1"/>
          <line x1="0"  y1="12" x2="0"  y2="24" stroke="rgba(0,0,0,.15)" stroke-width="1"/>
          <line x1="44" y1="12" x2="44" y2="24" stroke="rgba(0,0,0,.15)" stroke-width="1"/>
        </pattern>
        <pattern id="moss" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
          <circle cx="4"  cy="5"  r="3" fill="rgba(35,80,45,.25)"/>
          <circle cx="13" cy="13" r="2" fill="rgba(35,80,45,.18)"/>
          <circle cx="9"  cy="2"  r="2" fill="rgba(45,90,50,.12)"/>
        </pattern>
      </defs>

      <!-- ground shadow -->
      <ellipse cx="180" cy="435" rx="112" ry="16" fill="rgba(0,0,0,.55)" filter="url(#blur4)"/>

      <!-- ══ BASE PLATFORM ══ -->
      <!-- bottom edge shadow -->
      <ellipse cx="180" cy="426" rx="118" ry="19" fill="url(#stoneDk)"/>
      <!-- base top -->
      <ellipse cx="180" cy="420" rx="118" ry="19" fill="url(#stoneMain)" filter="url(#drop)"/>
      <ellipse cx="180" cy="420" rx="118" ry="19" fill="url(#bricks)" opacity=".5"/>
      <ellipse cx="180" cy="420" rx="118" ry="19" fill="url(#moss)" opacity=".6"/>
      <!-- base highlight -->
      <path d="M 85 412 Q 180 400 275 412" fill="none" stroke="rgba(160,145,200,.2)" stroke-width="2"/>

      <!-- ══ WELL CYLINDER ══ -->
      <!-- back ellipse (top of cylinder interior) -->
      <ellipse cx="180" cy="298" rx="92" ry="16" fill="#08060f"/>
      <!-- cylinder body -->
      <rect x="88" y="298" width="184" height="122" fill="url(#stoneMain)"/>
      <rect x="88" y="298" width="184" height="122" fill="url(#bricks)" opacity=".7"/>
      <rect x="88" y="298" width="184" height="122" fill="url(#moss)" opacity=".45"/>
      <!-- left shadow -->
      <rect x="88"  y="298" width="32" height="122" fill="rgba(0,0,0,.4)"/>
      <!-- right shadow -->
      <rect x="240" y="298" width="32" height="122" fill="rgba(0,0,0,.32)"/>
      <!-- center subtle highlight strip -->
      <rect x="160" y="298" width="40" height="122" fill="rgba(255,255,255,.025)"/>
      <!-- horizontal mortar lines accent -->
      <line x1="88" y1="322" x2="272" y2="322" stroke="rgba(0,0,0,.18)" stroke-width="1.5"/>
      <line x1="88" y1="346" x2="272" y2="346" stroke="rgba(0,0,0,.18)" stroke-width="1.5"/>
      <line x1="88" y1="370" x2="272" y2="370" stroke="rgba(0,0,0,.18)" stroke-width="1.5"/>
      <line x1="88" y1="394" x2="272" y2="394" stroke="rgba(0,0,0,.18)" stroke-width="1.5"/>

      <!-- ══ WATER ══ -->
      <rect x="89" y="362" width="182" height="58" fill="url(#waterG)" rx="2"/>
      <!-- glow top -->
      <ellipse cx="180" cy="365" rx="88" ry="13" fill="url(#waterGl)" class="water-glow-anim"/>
      <!-- shimmer lines -->
      <g class="water-surface">
        <line x1="108" y1="368" x2="162" y2="368" stroke="#5bc8f5" stroke-width="1.5" stroke-linecap="round" opacity=".55"/>
        <line x1="178" y1="363" x2="238" y2="363" stroke="#a8e6ff" stroke-width="1"   stroke-linecap="round" opacity=".4"/>
        <line x1="135" y1="374" x2="205" y2="374" stroke="#5bc8f5" stroke-width="1"   stroke-linecap="round" opacity=".3"/>
      </g>
      <!-- sunken coins in water -->
      <ellipse cx="138" cy="414" rx="7"  ry="2.5" fill="rgba(212,168,67,.28)"/>
      <ellipse cx="212" cy="416" rx="5"  ry="2"   fill="rgba(212,168,67,.22)"/>
      <ellipse cx="168" cy="418" rx="6"  ry="2.2" fill="rgba(212,168,67,.18)"/>

      <!-- ══ MIST ══ -->
      <ellipse cx="143" cy="355" rx="30" ry="15" fill="rgba(160,220,255,.14)" class="mist" style="--md:4s;--mdelay:0s"/>
      <ellipse cx="215" cy="350" rx="36" ry="17" fill="rgba(160,220,255,.1)"  class="mist" style="--md:5.2s;--mdelay:1.5s"/>
      <ellipse cx="178" cy="343" rx="24" ry="11" fill="rgba(160,220,255,.08)" class="mist" style="--md:3.6s;--mdelay:2.9s"/>

      <!-- ══ WELL RIM ══ -->
      <!-- rim underside depth -->
      <ellipse cx="180" cy="305" rx="98" ry="17" fill="url(#stoneDk)"/>
      <!-- rim top -->
      <ellipse cx="180" cy="297" rx="98" ry="17" fill="url(#rimTop)" filter="url(#drop)"/>
      <ellipse cx="180" cy="297" rx="98" ry="17" fill="url(#bricks)" opacity=".4"/>
      <ellipse cx="180" cy="297" rx="98" ry="17" fill="url(#moss)" opacity=".5"/>
      <!-- rim top highlight arc -->
      <path d="M 98 291 Q 180 279 262 291" fill="none" stroke="rgba(180,165,220,.3)" stroke-width="2.5"/>
      <!-- inner well opening -->
      <ellipse cx="180" cy="297" rx="80" ry="13" fill="#050710"/>
      <ellipse cx="180" cy="297" rx="80" ry="13" fill="url(#waterGl)" opacity=".35"/>

      <!-- ══ POSTS ══ -->
      <!-- left post shadow -->
      <rect x="108" y="130" width="18" height="170" rx="5" fill="rgba(0,0,0,.4)" transform="translate(4,4)"/>
      <!-- left post -->
      <rect x="108" y="130" width="18" height="170" rx="5" fill="url(#postG)" filter="url(#drop)"/>
      <rect x="108" y="130" width="18" height="170" rx="5" fill="url(#bricks)" opacity=".4"/>
      <!-- left post highlight -->
      <rect x="112" y="130" width="5"  height="170" rx="2" fill="rgba(255,255,255,.05)"/>
      <!-- right post shadow -->
      <rect x="234" y="130" width="18" height="170" rx="5" fill="rgba(0,0,0,.4)" transform="translate(4,4)"/>
      <!-- right post -->
      <rect x="234" y="130" width="18" height="170" rx="5" fill="url(#postG)" filter="url(#drop)"/>
      <rect x="234" y="130" width="18" height="170" rx="5" fill="url(#bricks)" opacity=".4"/>
      <!-- right post highlight -->
      <rect x="238" y="130" width="5"  height="170" rx="2" fill="rgba(255,255,255,.04)"/>

      <!-- ══ CROSS BEAM ══ -->
      <rect x="96" y="180" width="168" height="16" rx="5" fill="url(#postG)" filter="url(#drop)"/>
      <rect x="96" y="180" width="168" height="6"  rx="3" fill="rgba(255,255,255,.07)"/>

      <!-- ══ ROPE ══ -->
      <g class="rope-line">
        <!-- rope shadow -->
        <line x1="182" y1="196" x2="182" y2="275" stroke="rgba(0,0,0,.4)" stroke-width="4" stroke-linecap="round"/>
        <!-- rope main -->
        <line x1="180" y1="196" x2="180" y2="275" stroke="#9a8a60" stroke-width="3" stroke-linecap="round"/>
        <line x1="180" y1="196" x2="180" y2="275" stroke="rgba(255,255,255,.1)" stroke-width="1" stroke-linecap="round"/>
        <!-- twist marks -->
        <line x1="177" y1="210" x2="183" y2="218" stroke="#6a5830" stroke-width="1.2" opacity=".7"/>
        <line x1="177" y1="228" x2="183" y2="236" stroke="#6a5830" stroke-width="1.2" opacity=".7"/>
        <line x1="177" y1="246" x2="183" y2="254" stroke="#6a5830" stroke-width="1.2" opacity=".7"/>
        <line x1="177" y1="262" x2="183" y2="270" stroke="#6a5830" stroke-width="1.2" opacity=".7"/>
      </g>

      <!-- ══ ROOF ══ -->
      <!-- roof shadow -->
      <polygon points="72,188 180,94 288,188" fill="rgba(0,0,0,.4)" filter="url(#blur2)" transform="translate(3,5)"/>
      <!-- roof main -->
      <polygon points="72,188 180,94 288,188" fill="url(#roofG)" filter="url(#drop)"/>
      <!-- roof ridge left face (lighter) -->
      <polygon points="72,188 180,94 140,188" fill="rgba(255,255,255,.06)"/>
      <!-- tile suggestion lines -->
      <line x1="96"  y1="174" x2="180" y2="112" stroke="rgba(255,255,255,.035)" stroke-width="9"/>
      <line x1="120" y1="179" x2="180" y2="126" stroke="rgba(255,255,255,.03)"  stroke-width="9"/>
      <line x1="148" y1="183" x2="180" y2="142" stroke="rgba(255,255,255,.025)" stroke-width="9"/>
      <!-- roof edge fascia -->
      <line x1="72" y1="188" x2="288" y2="188" stroke="rgba(255,255,255,.06)" stroke-width="3"/>
      <!-- underside of eave -->
      <rect x="84" y="186" width="192" height="10" rx="2" fill="#0a0813" opacity=".8"/>

      <!-- ridge finial (gold orb) -->
      <circle cx="180" cy="90" r="13" fill="rgba(0,0,0,.4)" filter="url(#blur2)" transform="translate(1,3)"/>
      <circle cx="180" cy="90" r="12" fill="url(#goldOrb)" filter="url(#drop)"/>
      <circle cx="176" cy="86" r="4"  fill="rgba(255,250,200,.5)" opacity=".6"/>

      <!-- eave balls -->
      <circle cx="72"  cy="188" r="8" fill="#1a1525"/>
      <circle cx="288" cy="188" r="8" fill="#1a1525"/>
      <circle cx="72"  cy="188" r="4" fill="url(#goldOrb)" opacity=".4"/>
      <circle cx="288" cy="188" r="4" fill="url(#goldOrb)" opacity=".4"/>
    </svg>

    <div class="ripple-el" id="rippleEl"></div>
  </div><!-- /well-wrap -->

  <!-- SLIDER -->
  <div class="slider-section">
    <div class="tier-display">
      <div class="tier-price" id="tierPrice">$1</div>
      <div class="tier-desc" id="tierDesc">1 minute of well wishing</div>
    </div>
    <div class="slider-wrap">
      <input type="range" id="wishSlider" min="0" max="2" step="1" value="0">
      <div class="tier-labels">
        <span class="tier-label active" id="lbl0">$1</span>
        <span class="tier-label" id="lbl1">$10</span>
        <span class="tier-label" id="lbl2">$20</span>
      </div>
    </div>
    <button class="cta-btn" id="ctaBtn">Begin Your Wish</button>
  </div>
</section>

<p class="tagline">
  Cast your coin into the ancient waters and let your deepest wishes ripple outward into the universe.
</p>

<script>
  // STARS
  const sc = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*2+.5;
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--lo:${(.1+Math.random()*.25).toFixed(2)};--hi:${(.55+Math.random()*.45).toFixed(2)};--d:${(2+Math.random()*4).toFixed(1)}s;--delay:-${(Math.random()*5).toFixed(1)}s;`;
    sc.appendChild(s);
  }

  // SLIDER
  const tiers = [
    { price:'$1',  desc:'1 minute of well wishing',  fill:'0%'   },
    { price:'$10', desc:'12 minutes of well wishing', fill:'50%'  },
    { price:'$20', desc:'25 minutes of well wishing', fill:'100%' },
  ];
  const slider=document.getElementById('wishSlider'),
        tp=document.getElementById('tierPrice'),
        td=document.getElementById('tierDesc'),
        lbls=[document.getElementById('lbl0'),document.getElementById('lbl1'),document.getElementById('lbl2')];

  function updateSlider(v){
    const t=tiers[v]; tp.textContent=t.price; td.textContent=t.desc;
    slider.style.setProperty('--fill',t.fill);
    lbls.forEach((l,i)=>l.classList.toggle('active',i===v));
  }
  slider.addEventListener('input',()=>updateSlider(+slider.value));
  updateSlider(0);

  // COIN
  const coinWrap=document.getElementById('coinWrap'),
        coinLabel=document.getElementById('coinLabel'),
        wishMsg=document.getElementById('wishMsg'),
        rippleEl=document.getElementById('rippleEl');
  const msgs=['✨ Your wish is cast...','🌙 May it come true...','✦ The waters heard you...','💫 Into the deep...','🌟 The well has spoken...','🕯️ Your wish takes flight...'];
  let dropping=false;

  coinWrap.addEventListener('click',()=>{
    if(dropping)return;
    dropping=true;
    coinLabel.style.opacity='0';
    wishMsg.textContent=msgs[Math.floor(Math.random()*msgs.length)];
    coinWrap.classList.add('dropping');
    wishMsg.classList.add('show');
    setTimeout(()=>rippleEl.classList.add('active'),940);
    setTimeout(()=>{
      coinWrap.classList.remove('dropping');
      rippleEl.classList.remove('active');
      wishMsg.classList.remove('show');
      coinLabel.style.opacity='';
      dropping=false;
    },2900);
  });

  document.getElementById('ctaBtn').addEventListener('click',()=>{
    const v=+slider.value;
    alert(`Your ${tiers[v].price} wish session (${tiers[v].desc}) is about to begin.\n\n✦ Toss the coin to make it so. ✦`);
  });
</script>
</body>
</html>
